<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add Category</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fc; color: #334155; }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 450px; margin: 100px auto; }
    .form-label { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: #475569; }
    .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e2e8f0; }
    .form-control:focus { border-color: #4361ee; box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }
    .btn-success { background-color: #10b981; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; width: 100%; }
    .btn-link { color: #64748b; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
    .btn-link:hover { color: #4361ee; }
  </style>
</head>
<body>

<div class="container">
  <div class="card p-4 p-md-5">
    <div class="text-center mb-4">
      <h3 class="fw-bold">Thêm danh mục</h3>
      <p class="text-muted small">Phân loại sản phẩm để quản lý dễ dàng hơn</p>
    </div>

    <form th:action="@{/admin/categories/add}" th:object="${category}" method="post">

      <div class="mb-4">
        <label class="form-label">Tên danh mục</label>
        <input type="text" class="form-control" placeholder="Ví dụ: Điện thoại, Laptop..." th:field="*{catName}">
        <small class="text-danger" style="font-size: 0.8rem;" th:if="${#fields.hasErrors('catName')}" th:errors="*{catName}"></small>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Lưu danh mục</button>
        <a th:href="@{/admin/categories}" class="btn btn-link text-center mt-2">
          <i class="bi bi-arrow-left"></i> Quay lại danh sách
        </a>
      </div>

    </form>
  </div>
</div>

</body>
</html>
