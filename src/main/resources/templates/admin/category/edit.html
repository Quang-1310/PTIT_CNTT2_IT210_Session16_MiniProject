<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa danh mục</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card p-4">

        <h3 class="mb-4 text-center">Sửa danh mục</h3>

        <form th:action="@{/admin/categories/edit}"
              th:object="${category}"
              method="post">

            <input type="hidden" th:field="*{catId}">

            <div class="mb-3">
                <label class="form-label">Tên danh mục</label>

                <input type="text"
                       class="form-control"
                       th:field="*{catName}"
                       th:classappend="${#fields.hasErrors('catName')} ? 'is-invalid' : ''">

                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('catName')}"
                     th:errors="*{catName}">
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-warning">
                    Cập nhật
                </button>

                <a th:href="@{/admin/categories}"
                   class="btn btn-secondary">
                    Quay lại
                </a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
